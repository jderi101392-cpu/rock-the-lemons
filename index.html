<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#FFE234"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rock the Lemons"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<title>Rock the Lemons</title>
<style>
:root{--y:#FFE234;--b:#4AABDB;--dk:#1a1a1a;--r:#F05A5A;--g:#4CAF50;--bg:#FFFDF0;--card:#fff;--br:#e8e0c0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dk);min-height:100vh;padding-bottom:80px;overflow-x:hidden;}
header{background:var(--y);padding:16px 20px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12);}
header img{width:56px;height:56px;object-fit:contain;border-radius:12px;}
header h1{font-size:1.3rem;font-weight:800;line-height:1.1;}
header h1 span{color:var(--b);display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
nav{display:flex;background:var(--dk);position:sticky;top:80px;z-index:99;}
nav button{flex:1;padding:12px 4px;background:none;border:none;color:#888;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
nav button.active{color:var(--y);border-bottom-color:var(--y);}
.tab{display:none;padding:16px;}.tab.active{display:block;}

/* UNDO */
#undoBar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--dk);color:#fff;padding:10px 20px;border-radius:99px;display:flex;align-items:center;gap:14px;font-size:.85rem;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#undoBar.show{transform:translateX(-50%) translateY(0);}
#undoBar button{background:var(--y);color:var(--dk);border:none;border-radius:99px;padding:4px 12px;font-weight:800;cursor:pointer;font-size:.82rem;}
#undoCnt{background:var(--b);color:#fff;border-radius:99px;padding:2px 8px;font-size:.75rem;font-weight:700;}

/* CHECKLIST */
.add-row{display:flex;gap:8px;margin-bottom:16px;padding:12px;background:var(--card);border-radius:12px;border:1.5px dashed var(--b);flex-wrap:wrap;}
.add-row input{flex:1;min-width:120px;border:none;outline:none;font-size:.95rem;background:transparent;}
.add-row select{border:1px solid var(--br);border-radius:6px;padding:4px 6px;font-size:.8rem;background:#fff;max-width:140px;}
.btn-add{background:var(--b);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:.9rem;}
.prog-wrap{background:var(--br);border-radius:99px;height:6px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g);border-radius:99px;transition:width .3s;}
.cl-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:2px solid var(--br);margin-top:8px;}
.prog-txt{font-size:.85rem;color:#666;}
.btn-reset-list{background:var(--r);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:.85rem;}
.category{margin-bottom:16px;}
.cat-hdr{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--b);padding:6px 0 8px;border-bottom:2px solid var(--br);margin-bottom:6px;}
.item-row{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--card);border-radius:10px;margin-bottom:5px;border:1.5px solid var(--br);}
.item-row.checked{opacity:.4;background:#f0f0f0;}
.item-row.checked .item-lbl{text-decoration:line-through;}
.item-row input[type=checkbox]{width:22px;height:22px;accent-color:var(--g);flex-shrink:0;cursor:pointer;}
.item-lbl{flex:1;font-size:.95rem;}
.del-btn{background:none;border:none;color:#bbb;font-size:1.1rem;cursor:pointer;padding:4px 8px;line-height:1;border-radius:6px;-webkit-tap-highlight-color:transparent;}
.del-btn:active{color:var(--r);background:#fff0f0;}

/* SALES */
.sec-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:12px;}
.sales-grid{display:grid;gap:14px;margin-bottom:20px;}
.prod-card{background:var(--card);border-radius:14px;border:2px solid var(--br);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.prod-info{flex:1;}
.prod-name{font-weight:700;font-size:1rem;}
.prod-price{font-size:.75rem;color:#888;margin-top:2px;}
.prod-rev{font-size:.9rem;font-weight:700;color:var(--g);margin-top:4px;}
.cnt-ctrl{display:flex;align-items:center;gap:10px;}
.cnt-disp{font-size:2rem;font-weight:900;min-width:46px;text-align:center;}
.btn-cnt{width:46px;height:46px;border-radius:50%;border:none;font-size:1.6rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.btn-plus{background:var(--y);color:var(--dk);}
.btn-plus:active{transform:scale(.88);}
.btn-minus{background:#eee;color:#555;}
.btn-minus:active{transform:scale(.88);}

.sales-summary{background:var(--dk);color:var(--y);border-radius:12px;padding:16px 18px;margin-bottom:20px;}
.sum-row{display:flex;justify-content:space-between;font-size:.88rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.sum-row:last-child{border:none;padding-top:10px;font-size:1.15rem;font-weight:900;}
.sum-lbl{opacity:.8;}

.btn-close{width:100%;background:var(--g);color:#fff;border:none;border-radius:12px;padding:15px;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.btn-close:active{opacity:.85;}
.btn-reset-sales{width:100%;background:transparent;color:var(--r);border:2px solid var(--r);border-radius:12px;padding:10px;font-size:.85rem;font-weight:700;cursor:pointer;}

/* HISTORY */
.hist-entry{background:var(--card);border-radius:12px;border:1.5px solid var(--br);padding:14px;margin-bottom:12px;}
.hist-date{font-weight:800;font-size:.95rem;margin-bottom:8px;color:var(--b);}
.hist-row{display:flex;justify-content:space-between;font-size:.88rem;padding:4px 0;border-bottom:1px solid #f0f0f0;}
.hist-total{font-weight:700;margin-top:8px;display:flex;justify-content:space-between;font-size:.9rem;padding-top:4px;border-top:2px solid var(--br);}
.empty{text-align:center;color:#aaa;padding:48px 0;font-size:.95rem;}

/* MODAL */
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:none;align-items:center;justify-content:center;padding:24px;}
#modalOverlay.show{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3);}
.modal-msg{font-size:1rem;font-weight:600;margin-bottom:18px;text-align:center;line-height:1.4;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;}
.modal-cancel{background:#eee;color:#555;}
.modal-ok{background:var(--g);color:#fff;}
.modal-ok.danger{background:var(--r);}

/* TOAST */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:var(--dk);color:var(--y);padding:18px 28px;border-radius:14px;font-size:1.05rem;font-weight:800;z-index:10001;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 8px 30px rgba(0,0,0,.35);}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>
</head>

  {id:'lemon',      name:'Lemon Overdrive',            color:'#FFE234', price:6},
  {id:'sugar_free', name:'Sugar Free Lemon Overdrive', color:'#4AABDB', price:6},
  {id:'strawberry', name:'Strawberry Slam',             color:'#F05A5A', price:7}
];

// ── CATEGORIES & DEFAULTS ────────────────────────────────────────────────────
const ALL_CATS = [
  'Tent & Booth Setup','Tables & Seating','Display & Decor','Serving Supplies',
  'Water Station','Lemonade Ingredients','Prep & Mixing Tools','Knives & Tools',
  'Coolers','Cleaning & Safety','Trash','Electronics','Misc.'
];

const DEFAULTS = [
  {cat:'Tent & Booth Setup',   items:['Tent','Tent Sidewall','Weights for tent (4)','Sand bag weights for tent (4)','Stakes for tent','String for tent stakes','Bungie cords (4)','Zip ties']},
  {cat:'Tables & Seating',     items:['Tables (2)','Table risers (8)','Table cloths (2)','Lawn chairs (2)']},
  {cat:'Display & Decor',      items:['Glass bowl','Mason Jar','Fake lemons (5 total)','Roll of stickers','Price Menu','Rock the Lemons Sign','Demo cup']},
  {cat:'Serving Supplies',     items:['Cups','Lids','Straws']},
  {cat:'Water Station',        items:['Water jug stand','Water dispenser']},
  {cat:'Lemonade Ingredients', items:['Lemons','Strawberries','Strawberry container','Strawberry syrup','Sugar Free Syrup','Sugar','Ice','Water jugs (2-3)']},
  {cat:'Prep & Mixing Tools',  items:['Lemon cutting board','Wooden cutting board','Juicer','Muddler (2)','Sugar container','Sugar 1/4 cup scoop','Lid punchers (2)']},
  {cat:'Knives & Tools',       items:['Knife for lemons','Knife for boxes','Scissors']},
  {cat:'Coolers',              items:['Lemon cooler','Ice cooler','Ice scoop']},
  {cat:'Cleaning & Safety',    items:['Paper towels','Wipes','Gloves']},
  {cat:'Trash',                items:['Trash can','Small trash bags']},
  {cat:'Electronics',          items:['Speaker','Fly fans (2)']},
  {cat:'Misc.',                items:[]}
];

const EXPECTED = DEFAULTS.reduce((s,c)=>s+c.items.length, 0);
const STORE_KEY = 'rtl_list_v5';
const SALES_KEY = 'rtl_sales_v5';
const HIST_KEY  = 'rtl_hist_v5';

// ── IN-MEMORY STATE (synced from Firebase) ───────────────────────────────────
// These hold the current data. Firebase listeners keep them up to date,
// and we cache to localStorage so the app still shows data if offline/loading.
let STATE = {
  list:  null,
  sales: {lemon:0, sugar_free:0, strawberry:0},
  hist:  []
};

// ── STORAGE ──────────────────────────────────────────────────────────────────
function freshList() {
  const l = [];
  DEFAULTS.forEach(c => c.items.forEach(label =>
    l.push({id:'i'+Date.now().toString(36)+Math.random().toString(36).slice(2), cat:c.cat, label, checked:false})
  ));
  return l;
}

// READS — return current in-memory state (kept fresh by Firebase listeners)
function loadList() {
  if (Array.isArray(STATE.list) && STATE.list.length >= EXPECTED) return STATE.list;
  // fall back to local cache, then fresh defaults
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (Array.isArray(p) && p.length >= EXPECTED) return p;
    }
  } catch(e) {}
  return freshList();
}

function loadSales() { return STATE.sales || {lemon:0, sugar_free:0, strawberry:0}; }
function loadHist()  { return Array.isArray(STATE.hist) ? STATE.hist : []; }

// WRITES — update memory, cache locally, push to Firebase
function saveList(l) {
  STATE.list = l;
  try { localStorage.setItem(STORE_KEY, JSON.stringify(l)); } catch(e) {}
  if (window.FB) window.FB.write('checklist', l).catch(()=>{});
}

function saveSales(s) {
  STATE.sales = s;
  try { localStorage.setItem(SALES_KEY, JSON.stringify(s)); } catch(e) {}
  if (window.FB) window.FB.write('salesToday', s).catch(()=>{});
}

function saveHist(h) {
  STATE.hist = h;
  try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch(e) {}
  if (window.FB) window.FB.write('history', h).catch(()=>{});
}


// ── MODAL & TOAST ────────────────────────────────────────────────────────────
let modalResolve = null;

function askConfirm(message, danger) {
  return new Promise(resolve => {
    modalResolve = resolve;
    document.getElementById('modalMsg').textContent = message;
    const ok = document.getElementById('modalOk');
    ok.className = 'modal-ok' + (danger ? ' danger' : '');
    document.getElementById('modalOverlay').classList.add('show');
  });
}

function closeModal(result) {
  document.getElementById('modalOverlay').classList.remove('show');
  if (modalResolve) { modalResolve(result); modalResolve = null; }
}

document.getElementById('modalOk').addEventListener('click', () => closeModal(true));
document.getElementById('modalCancel').addEventListener('click', () => closeModal(false));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal(false);
});

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── UNDO ─────────────────────────────────────────────────────────────────────
let undoStack = [], undoTimer = null;

function pushUndo(type, data) {
  undoStack.push({type, data: JSON.parse(JSON.stringify(data))});
  if (undoStack.length > 20) undoStack.shift();
  showUndoBar();
}

function showUndoBar() {
  document.getElementById('undoCnt').textContent = undoStack.length + ' left';
  document.getElementById('undoBar').classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => document.getElementById('undoBar').classList.remove('show'), 5000);
}

function doUndo() {
  if (!undoStack.length) return;
  const {type, data} = undoStack.pop();
  if (type === 'list')  { saveList(data);  renderList(); }
  if (type === 'sales') { saveSales(data); renderSales(); }
  if (undoStack.length) showUndoBar();
  else document.getElementById('undoBar').classList.remove('show');
}

// ── CHECKLIST ────────────────────────────────────────────────────────────────
function renderList() {
  const list = loadList();
  const body = document.getElementById('clBody');
  body.innerHTML = '';

  const grouped = {};
  ALL_CATS.forEach(c => grouped[c] = []);
  list.forEach(item => { if (grouped[item.cat]) grouped[item.cat].push(item); });

  ALL_CATS.forEach(cat => {
    const items = grouped[cat];
    const wrap = document.createElement('div');
    wrap.className = 'category';
    wrap.innerHTML = '<div class="cat-hdr">' + esc(cat) + '</div>';

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row' + (item.checked ? ' checked' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.checked;
      cb.addEventListener('change', function() { toggleItem(item.id, this.checked); });

      const lbl = document.createElement('span');
      lbl.className = 'item-lbl';
      lbl.textContent = item.label;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.addEventListener('click', function(e) { e.preventDefault(); removeItem(item.id); });

      row.appendChild(cb);
      row.appendChild(lbl);
      row.appendChild(del);
      wrap.appendChild(row);
    });

    body.appendChild(wrap);
  });

  const total = list.length;
  const done  = list.filter(i => i.checked).length;
  document.getElementById('progTxt').textContent  = done + ' / ' + total + ' packed';
  document.getElementById('progFill').style.width = total ? (done / total * 100) + '%' : '0%';

  // Rebuild category select, preserve selection
  const sel  = document.getElementById('newCat');
  const prev = sel.value;
  sel.innerHTML = '';
  ALL_CATS.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  if (prev) sel.value = prev;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleItem(id, checked) {
  const l = loadList();
  pushUndo('list', l);
  const it = l.find(i => i.id === id);
  if (it) { it.checked = checked; saveList(l); renderList(); }
}

function removeItem(id) {
  const l = loadList();
  pushUndo('list', l);
  saveList(l.filter(i => i.id !== id));
  renderList();
}

function addItem() {
  const text = document.getElementById('newText').value.trim();
  const cat  = document.getElementById('newCat').value;
  if (!text) return;
  const l = loadList();
  pushUndo('list', l);
  l.push({id:'i'+Date.now().toString(36)+Math.random().toString(36).slice(2), cat, label:text, checked:false});
  saveList(l);
  document.getElementById('newText').value = '';
  renderList();
}

async function resetList() {
  if (!await askConfirm('Uncheck all items?', false)) return;
  const l = loadList();
  pushUndo('list', l);
  l.forEach(i => i.checked = false);
  saveList(l);
  renderList();
}

// ── SALES ────────────────────────────────────────────────────────────────────
function renderSales() {
  const sales = loadSales();
  const grid  = document.getElementById('salesGrid');
  grid.innerHTML = '';

  let totalUnits = 0, totalRev = 0;

  PRODUCTS.forEach(p => {
    const cnt = sales[p.id] || 0;
    const rev = cnt * p.price;
    totalUnits += cnt;
    totalRev   += rev;

    const card = document.createElement('div');
    card.className = 'prod-card';
    card.style.borderColor = p.color;
    card.innerHTML =
      '<div class="prod-info">' +
        '<div class="prod-name">' + esc(p.name) + '</div>' +
        '<div class="prod-price">$' + p.price + ' each</div>' +
        '<div class="prod-rev" id="rev-' + p.id + '">$' + rev.toFixed(2) + '</div>' +
      '</div>' +
      '<div class="cnt-ctrl">' +
        '<button class="btn-cnt btn-minus" onclick="adjSale(\'' + p.id + '\',-1)">−</button>' +
        '<span class="cnt-disp" id="cnt-' + p.id + '">' + cnt + '</span>' +
        '<button class="btn-cnt btn-plus" onclick="adjSale(\'' + p.id + '\',1)" style="background:' + p.color + '">+</button>' +
      '</div>';
    grid.appendChild(card);
  });

  document.getElementById('salesSummary').innerHTML =
    PRODUCTS.map(p => {
      const cnt = sales[p.id] || 0;
      return '<div class="sum-row"><span class="sum-lbl">' + esc(p.name) + '</span><span>' + cnt + ' × $' + p.price + ' = $' + (cnt * p.price).toFixed(2) + '</span></div>';
    }).join('') +
    '<div class="sum-row"><span class="sum-lbl">Total Units</span><span>' + totalUnits + '</span></div>' +
    '<div class="sum-row"><span>💰 Total Revenue</span><span>$' + totalRev.toFixed(2) + '</span></div>';
}

function adjSale(id, delta) {
  const s = loadSales();
  pushUndo('sales', s);
  s[id] = Math.max(0, (s[id] || 0) + delta);
  saveSales(s);
  renderSales();
}

async function resetSales() {
  if (!await askConfirm("Reset today's counts to zero?", true)) return;
  const s = loadSales();
  pushUndo('sales', s);
  saveSales({lemon:0, sugar_free:0, strawberry:0});
  renderSales();
  showToast('Counts reset');
}

async function closeDay() {
  const s     = loadSales();
  const units = PRODUCTS.reduce((a, p) => a + (s[p.id] || 0), 0);
  const rev   = PRODUCTS.reduce((a, p) => a + (s[p.id] || 0) * p.price, 0);

  if (units === 0) { showToast('No sales to save yet'); return; }
  if (!await askConfirm("Save today's sales to history and reset counters?", false)) return;

  const hist  = loadHist();
  const today = new Date().toLocaleDateString('en-US', {weekday:'short', year:'numeric', month:'short', day:'numeric'});

  hist.unshift({
    date: today,
    sales: {lemon: s.lemon||0, sugar_free: s.sugar_free||0, strawberry: s.strawberry||0},
    revenue: parseFloat(rev.toFixed(2)),
    savedAt: new Date().toISOString()
  });

  saveHist(hist);
  saveSales({lemon:0, sugar_free:0, strawberry:0});
  renderSales();
  showToast('Day saved! 🍋');
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const hist = loadHist();
  const body = document.getElementById('histBody');

  if (!hist.length) {
    body.innerHTML = '<div class="empty">No sales history yet.<br>Close out a day to see it here.</div>';
    return;
  }

  body.innerHTML = '';
  hist.forEach(entry => {
    const units = PRODUCTS.reduce((a, p) => a + (entry.sales[p.id] || 0), 0);
    const rev   = entry.revenue != null ? entry.revenue : PRODUCTS.reduce((a, p) => a + (entry.sales[p.id] || 0) * p.price, 0);

    const d = document.createElement('div');
    d.className = 'hist-entry';
    d.innerHTML =
      '<div class="hist-date">' + esc(entry.date) + '</div>' +
      PRODUCTS.map(p =>
        '<div class="hist-row"><span>' + esc(p.name) + '</span><span>' +
        (entry.sales[p.id] || 0) + ' × $' + p.price + ' = $' + ((entry.sales[p.id] || 0) * p.price).toFixed(2) +
        '</span></div>'
      ).join('') +
      '<div class="hist-total"><span>Units: ' + units + '</span><span>Revenue: $' + parseFloat(rev).toFixed(2) + '</span></div>';
    body.appendChild(d);
  });
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'history') renderHistory();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Clear old version keys
['rtl_checklist','rtl_list','rtl_list2','rtl_sales','rtl_sales2','rtl_hist','rtl_hist2',
 'rtl_list_v3','rtl_sales_v3','rtl_hist_v3','rtl_list_v4','rtl_sales_v4','rtl_hist_v4'].forEach(k => localStorage.removeItem(k));

// Render immediately from local cache so the app isn't blank while Firebase loads
renderList();
renderSales();

// Track which paths have received their first cloud snapshot
let seeded = { list:false, sales:false, hist:false };

function startFirebase() {
  if (!window.FB) return;

  // CHECKLIST
  window.FB.listen('checklist', val => {
    if (val && Array.isArray(val) && val.length >= EXPECTED) {
      STATE.list = val;
      try { localStorage.setItem(STORE_KEY, JSON.stringify(val)); } catch(e) {}
    } else if (!seeded.list) {
      // Cloud empty on first load — seed it with current/default list
      const initial = loadList();
      STATE.list = initial;
      window.FB.write('checklist', initial).catch(()=>{});
    }
    seeded.list = true;
    renderList();
  });

  // SALES (today)
  window.FB.listen('salesToday', val => {
    if (val && typeof val === 'object') {
      STATE.sales = {
        lemon:      val.lemon      || 0,
        sugar_free: val.sugar_free || 0,
        strawberry: val.strawberry || 0
      };
      try { localStorage.setItem(SALES_KEY, JSON.stringify(STATE.sales)); } catch(e) {}
    } else if (!seeded.sales) {
      STATE.sales = {lemon:0, sugar_free:0, strawberry:0};
      window.FB.write('salesToday', STATE.sales).catch(()=>{});
    }
    seeded.sales = true;
    renderSales();
  });

  // HISTORY
  window.FB.listen('history', val => {
    STATE.hist = Array.isArray(val) ? val : [];
    try { localStorage.setItem(HIST_KEY, JSON.stringify(STATE.hist)); } catch(e) {}
    seeded.hist = true;
    if (document.getElementById('tab-history').classList.contains('active')) renderHistory();
  });
}

// Firebase module may load before or after this script runs
if (window.FB) startFirebase();
else window.addEventListener('fb-ready', startFirebase);
</script>
</body>
</html>
